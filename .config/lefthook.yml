min_version: 2.0.5
pre-commit:
  jobs:
    - name: Check Secrets
      group:
        parallel: true
        jobs:
          - name: gitleaks
            run: mise x -- gitleaks git --no-banner --pre-commit --redact --staged --verbose

          - name: ripsecrets
            run: mise x -- ripsecrets --strict-ignore -- {staged_files}
            file_types: text
            skip:
              # With skip run checks, make sure that the first one is the "skip windows" check,
              # as windows takes 10x longer to run things than mac os or linux, and the first
              # command that returns 0 triggers the command to be skipped outright.
              # Also, avoid `uname` until windows has been filtered out, as it slows things down
              # on windows even more.
              - run: test "$OS" == "Windows_NT"
            tags:
              - windows-incompatible

    - name: Linting
      group:
        parallel: true
        jobs:
          - name: ansible-lint
            run: mise x -- ansible-lint --fix=all -- {staged_files}
            stage_fixed: true
            glob:
              - playbooks/*.yml
            exclude: ['**/symlink_*', '**/modify_*', '**/remove_*']
            file_types: text
            # This might work fine on Windows now, I haven't tested it
            skip:
              - run: test "$OS" == "Windows_NT"
            tags:
              - windows-incompatible

          - name: ruff
            run: mise x -- ruff check --fix -- {staged_files}
            stage_fixed: true
            glob: ['*.py']
            exclude:
              - '**/symlink_*'
              - '**/remove_*'
              - home/dot_config/*_carapace/*_choices
            file_types: text

          - name: ty
            run: mise x -- ty check -- {staged_files}
            glob: ['*.py']
            exclude:
              - '**/symlink_*'
              - '**/remove_*'
              - home/dot_config/*_carapace/*_choices
            file_types: text

          - name: yamllint
            run: mise x -- yamllint -- {staged_files}
            glob: ['*.yml', '*.yaml']
            exclude:
              - playbooks/* # Redundant with ansible-lint
              - pnpm-lock.yaml
              - schemas/vendor/*
              - '**/symlink_*'
              - '**/modify_*'
              - '**/remove_*'
            file_types: text

          - name: desktop-file-validate
            run: desktop-file-validate {staged_files}
            glob: '*.desktop'
            exclude: ['**/symlink_*', '**/remove_*', '**/modify_*']
            file_types: text
            skip:
              - run: test "$OS" == "Windows_NT"
              - run: test "$(uname)" != "Linux"
              - run: '! command -v desktop-file-validate'
            tags:
              - windows-incompatible
              - macos-incompatible

          - name: tombi
            run: mise x -- tombi lint -- {staged_files}
            glob: ['*.toml']
            exclude:
              - '**/symlink_*'
              - '**/remove_*'
              - '**/modify_*'
              - uv.lock
            file_types: text

          - name: topiary
            run: topiary check-grammar -- {staged_files}
            glob: ['*.desktop', '*.fish']
            exclude: ['**/symlink_*', '**/remove_*']
            file_types: text
            skip:
              - run: test "$OS" == "Windows_NT"
              - run: '! command -v topiary'
            tags:
              - windows-incompatible

          - name: deno lint
            run: mise x -- deno lint --fix -- {staged_files}
            stage_fixed: true
            glob: ['*.ts', '*.tsx', '*.js', '*.jsx']
            exclude: ['**/symlink_*', '**/remove_*']
            file_types: text

          - name: eslint
            run: mise x -- deno task --quiet eslint --cache --fix -- {staged_files}
            stage_fixed: true
            glob:
              - '*.ts'
              - '*.tsx'
              - '*.js'
              - '*.jsx'
              - '*.json'
              - '*.jsonc'
              - '*.yml'
              - '*.yaml'
            exclude:
              - '**/symlink_*'
              - '**/remove_*'
            file_types: text

          - name: check-jsonschema
            file_types: text
            exclude: ['**/symlink_*', '**/remove_*', '**/modify_*']
            group:
              parallel: true
              jobs:
                - run: mise x -- check-jsonschema --schemafile schemas/generated/chezmoidata.json
                  args: '{staged_files}'
                  glob:
                    - home/.chezmoidata/*.{yml,yaml,json}
                    - home/.chezmoidata/**/*.{yml,yaml,json}
                    - home/**/.chezmoidata.{yml,yaml,json}
                    - home/**/.chezmoidata/*.{yml,yaml,json}
                    - home/**/.chezmoidata/**/*.{yml,yaml,json}

                - run: mise x -- check-jsonschema --schemafile schemas/generated/eza-theme.json
                  args: '{staged_files}'
                  glob: home/dot_config/*_eza/*theme.yml

                - run: mise x -- check-jsonschema --schemafile schemas/vendor/lima.json
                  args: '{staged_files}'
                  glob: home/dot_config/*_lima/private_*/lima.yaml

                - run: mise x -- check-jsonschema --schemafile https://www.schemastore.org/prettierrc.json
                  args: '{staged_files}'
                  glob: .prettierrc.yaml

                - run: mise x -- check-jsonschema --schemafile https://www.schemastore.org/yamllint.json
                  args: '{staged_files}'
                  glob: .yamllint.yaml

                - run: mise x -- check-jsonschema --schemafile https://carapace.sh/schemas/command.json
                  args: '{staged_files}'
                  glob:
                    - home/dot_config/*_carapace/*_specs/*.yaml
                    - home/dot_config/*_carapace/*_overlays/*.yaml

                - run: mise x -- check-jsonschema --schemafile https://github.com/fastfetch-cli/fastfetch/raw/dev/doc/json_schema.json
                  args: --force-filetype json5 {staged_files}
                  glob: home/dot_config/*_fastfetch/*config.jsonc

          - name: carapace choices
            file_types: text
            glob: [home/dot_config/*_carapace/*_choices/*.tmpl]
            group:
              parallel: false
              jobs:
                - name: fix:carapace:shell-choices
                  run: mise run fix:carapace:shell-choices {staged_files}
                  stage_fixed: true

                - name: fix:carapace:inshellisense-choices
                  run: mise run fix:carapace:inshellisense-choices {staged_files}
                  stage_fixed: true

          # This might be able to run in a container
          - name: systemd-tmpfiles
            run: systemd-tmpfiles --dry-run --user --create --exclude-prefix=/ -- {staged_files}
            fail_text: syntax error in systemd tmpfile
            glob: home/dot_config/*_user-tmpfiles.d/*.conf
            exclude: ['**/symlink_*', '**/remove_*', '**/modify_*']
            file_types: text
            skip:
              - run: test "$OS" == "Windows_NT"
              - run: test "$(uname)" != "Linux"
              - run: '! command -v systemd-tmpfiles'
            tags:
              - windows-incompatible
              - macos-incompatible

    - name: Formatting
      group:
        parallel: true
        jobs:
          - name: prettier
            run: mise x -- deno task --quiet prettier --write --cache --ignore-unknown -- {staged_files}
            stage_fixed: true
            glob:
              - '*.{js,cjs,mjs,jsx}'
              - '*.{json,jsonc,json5}'
              - '*.{md,mdx}'
              - '*.{ts,cts,mts,tsx}'
              - '*.{yaml,yml}{,.tmpl}'
              - '*.code-snippets'
              - '*.css'
              - '*.html'
              - '*.less'
              - '*.plist{,.tmpl}'
              - '*.scss'
              - '*.sublime-syntax'
              - '*.vue'
              - '*.xml{,.tmpl}'
            exclude:
              - home/dot_config/*_nvim/lazy-lock.json
              - pnpm-lock.yaml
              - deno.lock
              - schemas/generated/*
              - schemas/vendor/*
              - '**/symlink_*'
              - '**/remove_*'
            file_types: text

          - name: fish_indent
            run: fish_indent --write -- {staged_files}
            stage_fixed: true
            glob: ['*.fish', '*.fish.tmpl']
            exclude:
              - '**/symlink_*'
              - '**/remove_*'
              - home/dot_config/*_carapace/*_choices
            file_types: text
            skip:
              - run: test "$OS" == "Windows_NT"
              - run: '! command -v fish_indent'
            tags:
              - windows-incompatible

          - name: ruff
            run: mise x -- ruff format -- {staged_files}
            stage_fixed: true
            glob: ['*.py']
            exclude:
              - '**/symlink_*'
              - '**/remove_*'
              - home/dot_config/*_carapace/*_choices
            file_types: text

          - name: stylua
            run: mise x -- stylua --respect-ignores -- {staged_files}
            stage_fixed: true
            glob: ['*.lua']
            exclude:
              - '**/symlink_*'
              - '**/remove_*'
              - home/dot_config/*_carapace/*_choices
            file_types: text

          - name: tombi
            run: mise x -- tombi format -- {staged_files}
            stage_fixed: true
            glob: ['*.toml']
            exclude:
              - '**/symlink_*'
              - '**/remove_*'
              - '**/modify_*'
              - uv.lock
            file_types: text

          - name: topiary
            run: topiary format -- {staged_files}
            stage_fixed: true
            glob: ['*.ncl', '*.scm', '*.nu']
            exclude: ['**/symlink_*', '**/remove_*']
            file_types: text
            skip:
              - run: test "$OS" == "Windows_NT"
              - run: '! command -v topiary'
            tags:
              - windows-incompatible

pre-push:
  parallel: true
  commands:
    ripsecrets:
      run: mise x -- ripsecrets --strict-ignore -- {push_files}
      file_types: text
      skip:
        - run: test "$OS" == "Windows_NT"
      tags:
        - windows-incompatible
