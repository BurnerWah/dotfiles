# tombi: format.rules.table-keys-order = "ascending"
# These are mostly intended for usage in lefthook git hooks

[task_templates."linter:check-jsonschema"]
usage = '''
arg "<files>" var=#true {
  {% if vars.default %}
  default "{{vars.default}}"
  {% endif %}
}
'''
run = '''
check-jsonschema --default-filetype json5 --schemafile {{vars.schema}} -- ${usage_files}
'''

[tasks."validate:schema:carapace"]
extends = "linter:check-jsonschema"
vars.schema = "https://carapace.sh/schemas/command.json"

[tasks."validate:schema:chezmoidata"]
extends = "linter:check-jsonschema"
vars.schema = "schemas/generated/chezmoidata.json"

[tasks."validate:schema:deno"]
extends = "linter:check-jsonschema"
vars.schema = "https://raw.githubusercontent.com/denoland/deno/main/cli/schemas/config-file.v1.json"
vars.default = "deno.jsonc"
description = "Validate Deno's config file"
alias = ["lint:schema:deno"]

[tasks."validate:schema:fastfetch"]
extends = "linter:check-jsonschema"
vars.schema = "https://github.com/fastfetch-cli/fastfetch/raw/dev/doc/json_schema.json"
