# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
title: Eza Theme
description: Eza Theme

$defs:
  Style:
    # I can't get this working
    # allOf:
    #   - $ref: '#/$defs/Foreground'
    #   - $ref: '#/$defs/Background'
    type: object
    properties:
      foreground: { $ref: '#/$defs/ForegroundProp' }
      fg: { $ref: '#/$defs/ForegroundProp' }
      background: { $ref: '#/$defs/BackgroundProp' }
      bg: { $ref: '#/$defs/BackgroundProp' }
      is_bold: { type: boolean }
      bold: { type: boolean }
      is_dimmed: { type: boolean }
      dimmed: { type: boolean }
      is_italic: { type: boolean }
      italic: { type: boolean }
      is_underline: { type: boolean }
      underline: { type: boolean }
      is_blink: { type: boolean }
      blink: { type: boolean }
      is_reverse: { type: boolean }
      reverse: { type: boolean }
      is_hidden: { type: boolean }
      hidden: { type: boolean }
      is_strikethrough: { type: boolean }
      strikethrough: { type: boolean }
      prefix_with_reset: { type: boolean }
      prefix_reset: { type: boolean }
    additionalProperties: false

  Foreground:
    oneOf:
      - type: object
        properties:
          foreground: { $ref: '#/$defs/ForegroundProp' }
      - type: object
        properties:
          fg: { $ref: '#/$defs/ForegroundProp' }
  ForegroundProp:
    description: The style's foreground color
    $ref: '#/$defs/ColorProp'

  Background:
    oneOf:
      - type: object
        properties:
          background: { $ref: '#/$defs/BackgroundProp' }
      - type: object
        properties:
          bg: { $ref: '#/$defs/BackgroundProp' }
  BackgroundProp:
    description: The style's background color
    $ref: '#/$defs/ColorProp'

  ColorProp:
    oneOf:
      - enum:
          - none
          - None
          - default
          - Default
          - black
          - Black
          - darkgray
          - DarkGray
          - red
          - Red
          - lightred
          - LightRed
          - green
          - Green
          - lightgreen
          - LightGreen
          - yellow
          - Yellow
          - lightyellow
          - LightYellow
          - blue
          - Blue
          - lightblue
          - LightBlue
          - purple
          - Purple
          - lightpurple
          - LightPurple
          - magenta
          - Magenta
          - lightmagenta
          - LightMagenta
          - cyan
          - Cyan
          - lightcyan
          - LightCyan
          - white
          - White
          - lightgray
          - LightGray
      - type: string
        pattern: ^#[0-9a-fA-F]{6}$
      - type: string
        pattern: ^#[0-9a-fA-F]{3}$
      - type: integer
        minimum: 0
        maximum: 255

  # Config Groups
  FileKindsOverride:
    type: object
    additionalProperties: false
    properties:
      normal: { $ref: '#/$defs/Style' }
      directory: { $ref: '#/$defs/Style' }
      symlink: { $ref: '#/$defs/Style' }
      pipe: { $ref: '#/$defs/Style' }
      block_device: { $ref: '#/$defs/Style' }
      char_device: { $ref: '#/$defs/Style' }
      socket: { $ref: '#/$defs/Style' }
      special: { $ref: '#/$defs/Style' }
      executable: { $ref: '#/$defs/Style' }
      mount_point: { $ref: '#/$defs/Style' }
  PermissionsOverride:
    type: object
    additionalProperties: false
    properties:
      user_read: { $ref: '#/$defs/Style' }
      user_write: { $ref: '#/$defs/Style' }
      user_execute_file: { $ref: '#/$defs/Style' }
      user_execute_other: { $ref: '#/$defs/Style' }
      group_read: { $ref: '#/$defs/Style' }
      group_write: { $ref: '#/$defs/Style' }
      group_execute: { $ref: '#/$defs/Style' }
      other_read: { $ref: '#/$defs/Style' }
      other_write: { $ref: '#/$defs/Style' }
      other_execute: { $ref: '#/$defs/Style' }
      special_user_file: { $ref: '#/$defs/Style' }
      special_other: { $ref: '#/$defs/Style' }
      attribute: { $ref: '#/$defs/Style' }
  SizeOverride:
    type: object
    additionalProperties: false
    properties:
      major: { $ref: '#/$defs/Style' }
      minor: { $ref: '#/$defs/Style' }
      number_byte: { $ref: '#/$defs/Style' }
      number_kilo: { $ref: '#/$defs/Style' }
      number_mega: { $ref: '#/$defs/Style' }
      number_giga: { $ref: '#/$defs/Style' }
      number_huge: { $ref: '#/$defs/Style' }
      unit_byte: { $ref: '#/$defs/Style' }
      unit_kilo: { $ref: '#/$defs/Style' }
      unit_mega: { $ref: '#/$defs/Style' }
      unit_giga: { $ref: '#/$defs/Style' }
      unit_huge: { $ref: '#/$defs/Style' }
  UsersOverride:
    type: object
    additionalProperties: false
    properties:
      user_you: { $ref: '#/$defs/Style' }
      user_root: { $ref: '#/$defs/Style' }
      user_other: { $ref: '#/$defs/Style' }
      group_yours: { $ref: '#/$defs/Style' }
      group_other: { $ref: '#/$defs/Style' }
      group_root: { $ref: '#/$defs/Style' }
  LinksOverride:
    type: object
    additionalProperties: false
    properties:
      normal: { $ref: '#/$defs/Style' }
      multi_link_file: { $ref: '#/$defs/Style' }
  GitOverride:
    type: object
    additionalProperties: false
    properties:
      new: { $ref: '#/$defs/Style' }
      modified: { $ref: '#/$defs/Style' }
      deleted: { $ref: '#/$defs/Style' }
      renamed: { $ref: '#/$defs/Style' }
      typechange: { $ref: '#/$defs/Style' }
      ignored: { $ref: '#/$defs/Style' }
      conflicted: { $ref: '#/$defs/Style' }
  GitRepoOverride:
    type: object
    additionalProperties: false
    properties:
      branch_main: { $ref: '#/$defs/Style' }
      branch_other: { $ref: '#/$defs/Style' }
      git_clean: { $ref: '#/$defs/Style' }
      git_dirty: { $ref: '#/$defs/Style' }
  SELinuxContextOverride:
    type: object
    additionalProperties: false
    properties:
      colon: { $ref: '#/$defs/Style' }
      user: { $ref: '#/$defs/Style' }
      role: { $ref: '#/$defs/Style' }
      typ: { $ref: '#/$defs/Style' }
      range: { $ref: '#/$defs/Style' }
  SecurityContextOverride:
    type: object
    additionalProperties: false
    properties:
      none: { $ref: '#/$defs/Style' }
      selinux: { $ref: '#/$defs/SELinuxContextOverride' }
  FileTypeOverride:
    type: object
    additionalProperties: false
    properties:
      image: { $ref: '#/$defs/Style' }
      video: { $ref: '#/$defs/Style' }
      music: { $ref: '#/$defs/Style' }
      lossless: { $ref: '#/$defs/Style' }
      crypto: { $ref: '#/$defs/Style' }
      document: { $ref: '#/$defs/Style' }
      compressed: { $ref: '#/$defs/Style' }
      temp: { $ref: '#/$defs/Style' }
      compiled: { $ref: '#/$defs/Style' }
      build: { $ref: '#/$defs/Style' }
      source: { $ref: '#/$defs/Style' }

  IconStyleOverride:
    type: object
    properties:
      glyph: { type: string }
      style: { $ref: '#/$defs/Style' }
  FileNameStyleOverride:
    type: object
    additionalProperties:
      type: object
      properties:
        icon: { $ref: '#/$defs/IconStyleOverride' }
        filename: { $ref: '#/$defs/Style' }

type: object
properties:
  colourful: { type: boolean }

  filekinds: { $ref: '#/$defs/FileKindsOverride' }
  perms: { $ref: '#/$defs/PermissionsOverride' }
  size: { $ref: '#/$defs/SizeOverride' }
  users: { $ref: '#/$defs/UsersOverride' }
  links: { $ref: '#/$defs/LinksOverride' }
  git: { $ref: '#/$defs/GitOverride' }
  git_repo: { $ref: '#/$defs/GitRepoOverride' }
  security_context: { $ref: '#/$defs/SecurityContextOverride' }
  file_type: { $ref: '#/$defs/FileTypeOverride' }

  punctuation: { $ref: '#/$defs/Style' }
  date: { $ref: '#/$defs/Style' }
  inode: { $ref: '#/$defs/Style' }
  blocks: { $ref: '#/$defs/Style' }
  header: { $ref: '#/$defs/Style' }
  octal: { $ref: '#/$defs/Style' }
  flags: { $ref: '#/$defs/Style' }

  symlink_path: { $ref: '#/$defs/Style' }
  control_char: { $ref: '#/$defs/Style' }
  broken_symlink: { $ref: '#/$defs/Style' }
  broken_path_overlay: { $ref: '#/$defs/Style' }

  filenames: { $ref: '#/$defs/FileNameStyleOverride' }
  extensions: { $ref: '#/$defs/FileNameStyleOverride' }
