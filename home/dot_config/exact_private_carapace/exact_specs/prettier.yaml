name: prettier
description: ''
flags:
  -c, --check: Check if the given files are formatted
  -l, --list-different: Print the names of files that are different from Prettier's formatting (see also --check).
  -w, --write: Edit files in-place. (Beware!)

  --arrow-parens=: Include parentheses around a sole arrow function parameter
  --bracket-same-line: Put > of opening tags on the last line instead of on a new line.
  --no-bracket-spacing: Do not print spaces between brackets.
  --embedded-language-formatting=: Control how Prettier formats quoted code embedded in the file.
  --end-of-line=: Which end of line characters to apply.
  --experimental-operator-position=: Where to print operators when binary expressions wrap lines.
  --no-experimental-ternaries: Default behavior of ternaries; keep question marks on the same line as the consequent.
  --html-whitespace-sensitivity=: How to handle whitespaces in HTML.
  --jsx-single-quote: Use single quotes in JSX.
  --object-wrap=: How to wrap object literals.
  --parser=: Which parser to use.
  --print-width=: The line length where Prettier will try wrap.
  --prose-wrap=: How to wrap prose.
  --quote-props=: Change when properties in objects are quoted.
  --no-semi: Do not print semicolons, except at the beginning of lines which may need them.
  --single-attribute-per-line: Enforce single attribute per line in HTML, Vue and JSX.
  --single-quote: Use single quotes instead of double quotes.
  --tab-width=: Number of spaces per indentation level.
  --trailing-comma=: Print trailing commas wherever possible when multi-line.
  --use-tabs: Indent with tabs instead of spaces.
  --vue-indent-script-and-style: Indent script and style tags in Vue files.

  --config=: Path to a Prettier configuration file (.prettierrc, package.json, prettier.config.js).
  --no-config: Do not look for a configuration file.
  --config-precedence: Define in which order config files and CLI options should be evaluated.
  --no-editorconfig: Don't take .editorconfig into account when parsing configuration.
  --find-config-path=: Find and print the path to a configuration file for the given input file.
  --ignore-path=*: Path to a file with patterns describing files to ignore.
  --plugin=*: Add a plugin. Multiple plugins can be passed as separate `--plugin`s.
  --with-node-modules: Process files inside 'node_modules' directory.

  --cursor-offset=: Print (to stderr) where a cursor at the given position would move to after formatting.
  --range-end=: Format code ending at a given character offset (exclusive).
  --range-start=: Format code starting at a given character offset.

  --cache: Only format changed files. Cannot use with --stdin-filepath.
  --cache-location=: Path to the cache file.
  --cache-strategy=: Strategy for the cache to use for detecting changed files.
  --check-ignore-pragma: Check whether the file's first docblock comment contains '@noprettier' or '@noformat' to determine if it should be formatted.
  --no-color: Do not colorize error messages.
  --no-error-on-unmatched-pattern: Prevent errors when pattern is unmatched.
  --file-info=: Extract the following info (as JSON) for a given file path.
  -h, --help=: Show CLI usage, or details about the given flag.
  -u, --ignore-unknown: Ignore unknown files.
  --insert-pragma: Insert @format pragma into file's first docblock comment.
  --log-level=: What level of logs to report.
  --require-pragma: Require either '@prettier' or '@format' to be present in the file's first docblock comment in order for it to be formatted.
  --stdin-filepath=: Path to the file to pretend that stdin comes from.
  --support-info: Print support information as JSON.
  -v, --version: Print Prettier version.
exclusiveflags:
  - [check, list-different, write]
  - [config, no-config]
completion:
  positionalany:
    - $files
  flag:
    arrow-parens:
      - "always\tAlways include parens. Example: `(x) => x`"
      - "avoid\tOmit parens when possible. Example: `x => x`"
    embedded-language-formatting:
      - "auto\tFormat embedded code if Prettier can automatically identify it."
      - "off\tNever automatically format embedded code."
    end-of-line: [lf, crlf, cr, auto]
    experimental-operator-position:
      - "start\tPrint operators at the start of new lines."
      - "end\tPrint operators at the end of previous lines."
    html-whitespace-sensitivity: [css, strict, ignore]
    object-wrap:
      - "preserve\tKeep as multi-line, if there is a newline between the opening brace and first property."
      - "collapse\tFit to a single line when possible."
    parser:
      - flow
      - babel
      - babel-flow
      - babel-ts
      - typescript
      - acorn
      - espree
      - meriyah
      - css
      - less
      - scss
      - json
      - json5
      - jsonc
      - json-stringify
      - graphql
      - markdown
      - mdx
      - vue
      - yaml
      - glimmer
      - html
      - angular
      - lwc
      - mjml
    prose-wrap: [always, never, preserve]
    quote-props: [as-needed, consistent, preserve]
    trailing-comma: [all, es5, none]
    config-precedence:
      - "cli-override\tCLI options take precedence over config file"
      - "file-override\tConfig file take precedence over CLI options"
      - "prefer-file\tIf a config file is found will evaluate it and ignore other CLI options"
    cache-strategy:
      - "metadata\tUse the file metadata such as timestamps as cache keys"
      - "content\tUse the file content as cache keys"
    log-level: [silent, error, warn, log, debug]
    config: [$files]
    find-config-path: [$files]
    ignore-path: [$files]
    plugin: [$files]
    cache-location: [$files]
    file-info: [$files]
    stdin-filepath: [$files]
