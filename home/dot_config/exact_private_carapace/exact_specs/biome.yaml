name: biome
description: Biome official CLI
persistentflags:
  -h, --help: Prints help information
flags:
  -V, --version: Prints version information

# TODO improve descriptions
# TODO add argument descriptions

commands:
  - name: version
    description: Shows Biome version
    flags: &flags_global_def
      --colors=: Set the formatting mode for markup
      --use-server: Connect to a running instance of the Biome daemon
      --verbose: Print additional diagnostics, and some diagnostics show more information.
      --config-path=: Path to the configuration file, or the directory that contains it
      --max-diagnostics=: Cap the amount of diagnostics displayed.
      --skip-parse-errors: Skip files containing syntax errors instead of emitting error diagnostics
      --no-errors-on-unmatched: Silence errors that would be emitted in case no files were processed
      --error-on-warnings: Exit with an error code if some diagnostics emit warnings
      --reporter=: How diagnostics and summary are reported
      --reporter-file=: File to output reports to
      --diagnostic-level=: Level of diagnostics to show
    completion:
      flag: &flags_global_cmp
        colors:
          - "off\tprints everything as plain text"
          - "force\tforces the formatting of markup using ANSI"
        config-path: ['$files([.json, .jsonc])', $directories]
        reporter: # Don't really like these descriptions that much
          - "default\tThe default reporter"
          - "json\tJSON format"
          - "json-pretty\tJSON format, formatted"
          - "github\tGitHub workflow format"
          - "junit\tJUnit format"
          - summary
          - "gitlab\tGitLab Code Quality report"
          - "checkstyle\tCheckstyle XML format"
          - "rdjson\tReviewdog JSON format"
          - "sarif\tSARIF format"
        reporter-file: [$files]
        diagnostic-level: [info, warn, error]

  - name: rage
    description: Prints info for debugging
    flags:
      <<:
        - *flags_global_def
        - &flags_logging_def
          --log-file=: Optional path/file to redirect log messages to
          --log-prefix-name=: ''
          --log-path=: Folder where logs are stored
          --log-level=: Level of logging
          --log-kind=: Log format to use
        - --daemon-logs: Prints the Biome daemon server logs
          --formatter: Prints the formatter options applied
          --linter: Prints the linter options applied
    completion:
      flag:
        <<:
          - *flags_global_cmp
          - &flags_logging_cmp
            log-path: [$directories]
            log-level:
              - "none\tDon't show any logging (default)"
              - debug
              - info
              - warn
              - error
            log-kind:
              - "pretty\tA pretty log on multiple lines with nice colours (default)"
              - "compact\tA more cluttered logging"
              - "json\tLogs are emitted in JSON format"

  - name: start
    description: Starts the Biome daemon server
    flags:
      <<:
        - *flags_logging_def
        - &flags_daemon_def
          --watcher-kind=: File watcher to use
          --watcher-polling-interval=: Polling interval in milliseconds
    completion:
      flag:
        <<:
          - *flags_logging_cmp
          - &flags_daemon_cmp
            watcher-kind:
              - "polling\tSlower than the recommended, but it avoids locking folders on Windows"
              - "recommended\tUse recommended strategy of the current OS (default)"
              - "none\tDisable the file watcher"

  - name: stop
    description: Stops the Biome daemon server

  - name: lint
    description: Lint files
    flags:
      <<:
        - *flags_global_def
        - *flags_logging_def
        - &flags_json_parser_def
          --json-parse-allow-comments=: Allow comments in .json files
          --json-parse-allow-trailing-commas=: Allow trailing commas in .json files
        - &flags_vcs_def
          --vcs-enabled=: Integrate with a VCS client
          --vcs-client-kind=: VCS Client to use
          --vcs-use-ignore-file=: Use the VCS ignore file
          --vcs-root=: Folder to check for VCS files
          --vcs-default-branch=: Main branch of the project
        - &flags_filesystem_def
          --files-max-size=: Maximum size for source code files in bytes
          --files-ignore-unknown=: Don't emit diagnostics when handling files Biome doesn't know
        - &flags_js_linter_def
          --javascript-linter-enabled=: Control the linter for JavaScript (and its super languages) files.
        - &flags_json_linter_def
          --json-linter-enabled=: Control the linter for JSON (and its super languages) files.
        - --write: Writes safe fixes
          --unsafe: Apply unsafe fixes. Should be used with --write or --fix
          --fix: Writes safe fixes
          --suppress: Fixes lint rule violations with comment suppressions instead of using a rule code action (fix)
          --reason=: Explanation for suppressing diagnostics with `--suppress`
        - &flags_vcs_file_selection_staged_def
          --staged: Only lint/format files that have been staged
        - &flags_vcs_file_selection_def
          --changed: Only lint/format files that have been changed compared to your `defaultBranch`
          --since=: Base branch to compare against when using the --changed flag and `defaultBranch` is not set
        - &flags_stdin_file_path_def
          --stdin-file-path=: The name of the file when passing it through stdin
        - &flags_rule_selection_def
          --only=: Run only the given lint rule, assist action, group of rules and actions, or domain.
          --skip=: Skip the given lint rule, assist action, group of rules and actions, or domain.
        - &flags_profile_rules_def
          --profile-rules: Enable rule profiling output
    completion:
      positionalany: [$files]
      flag:
        <<:
          - *flags_global_cmp
          - *flags_logging_cmp
          - &flags_json_parser_cmp
            json-parse-allow-comments: &bool ['true', 'false']
            json-parse-allow-trailing-commas: *bool
          - &flags_vcs_cmp
            vcs-enabled: &boolFalse ['true', "false\tdefault"]
            vcs-client-kind: [git]
            vcs-use-ignore-file: *bool
            vcs-root: [$directories]
            vcs-default-branch: [$carapace.tools.git.LocalBranches]
          - &flags_filesystem_cmp
            files-ignore-unknown: *boolFalse
          - &flags_js_linter_cmp
            javascript-linter-enabled: &boolTrue ["true\tdefault", 'false']
          - &flags_json_linter_cmp
            json-linter-enabled: *boolTrue
          - &flags_stdin_file_path_cmp
            stdin-file-path: [$files]
          - &flags_vcs_file_selection_cmp
            since: # This might be wrong
              - $carapace.tools.git.LocalBranches

  - name: format
    description: Format files
    flags:
      <<:
        - &flags_global_fmt_def
          --format-with-errors=: Format files even if they have syntax errors
          --indent-style=: Indent style
          --indent-width=: Indent size, 2 by default
          --line-ending=: Line endings
          --attribute-position=: Attribute position style in HTML-ish languages
          --bracket-same-line=: Put the `>` of a multi-line HTML or JSX element at the end of the last line instead of being alone on the next line
          --bracket-spacing=: Whether to insert spaces around brackets in object literals.
          --expand=: Whether to expand arrays and objects on multiple lines.
          --trailing-newline=: Add a trailing newline to the end of files
          --use-editorconfig=: Use .editorconfig files
        - &flags_js_fmt_def
          --javascript-formatter-enabled=: Control the formatter for JavaScript (and its super languages) files.
          --jsx-quote-style=: Type of quotes used in JSX
          --quote-properties=: When properties in objects are quoted. # Defaults to asNeeded.
          --trailing-commas=: Print trailing commas wherever possible in multi-line comma-separated syntactic structures. # Defaults to "all".
          --semicolons=: Add semicolons to all statements or only as needed
          --arrow-parentheses=: Add optional parentheses to arrow functions
          --bracket-same-line=: Whether to hug the closing bracket of multiline HTML/JSX tags to the end of the last line, rather than being alone on the following line.
          --javascript-formatter-indent-style=: Indent style for JavaScript (and its super languages)
          --javascript-formatter-indent-width=: Indent size for JavaScript (and its super languages) # Default to 2.
          --javascript-formatter-line-ending=: Line endings for JavaScript (and its super languages) files
          --javascript-formatter-line-width=: Max line width for JavaScript (and its super languages) # Defaults to 80.
          --javascript-formatter-quote-style=: Type of quotes used in JavaScript code
          --javascript-formatter-attribute-position=: Attribute position style in JSX elements # Defaults to auto.
          --javascript-formatter-bracket-spacing=: Whether to insert spaces around brackets in object literals.
          --javascript-formatter-expand=: Whether to expand arrays and objects on multiple lines.
          --javascript-formatter-operator-linebreak=: Where to break binary expressions into multiple lines when needed
          --javascript-formatter-trailing-newline=: Add a trailing newline to the end of JavaScript (and its super languages) files
        - *flags_json_parser_def
        - &flags_css_parser_def
          --css-parse-css-modules=: Enables parsing of CSS Modules specific features.
          --css-parse-tailwind-directives=: Enables parsing of Tailwind CSS 4.0 directives and functions.
        - &flags_graphql_fmt_def
          --graphql-formatter-enabled=: Control the formatter for GraphQL files.
          --graphql-formatter-indent-style=: Indent style for GraphQL
          --graphql-formatter-indent-width=: Indent size for GraphQL # Default to 2.
          --graphql-formatter-line-ending=: Line endings for GraphQL files
          --graphql-formatter-line-width=: Max line width for GraphQL # Defaults to 80.
          --graphql-formatter-quote-style=: Type of quotes used in GraphQL code
          --bracket-spacing=: Whether to insert spaces around brackets in object literals. # I suspect this flag is a bug lol
          --graphql-formatter-trailing-newline=: Add a trailing newline to the end of GraphQL files
        - &flags_css_fmt_def
          --css-formatter-enabled=: Control the formatter for CSS (and its super languages) files.
          --css-formatter-indent-style=: Indent style for CSS (and its super languages)
          --css-formatter-indent-width=: Indent size for CSS (and its super languages) # Default to 2.
          --css-formatter-line-ending=: Line endings for CSS (and its super languages) files
          --css-formatter-line-width=: Max line width for CSS (and its super languages) # Defaults to 80.
          --css-formatter-quote-style=: Type of quotes used in CSS code
          --css-formatter-trailing-newline=: Add a trailing newline to the end of CSS (and its super languages) files
        - &flags_html_fmt_def
          --html-formatter-enabled=: Control the formatter for HTML (and its super languages) files.
          --html-formatter-indent-style=: Indent style for HTML (and its super languages)
          --html-formatter-indent-width=: Indent size for HTML (and its super languages) # Default to 2.
          --html-formatter-line-ending=: Line endings for HTML (and its super languages) files
          --html-formatter-line-width=: Max line width for HTML (and its super languages) # Defaults to 80.
          --html-formatter-attribute-position=: Attribute position style in HTML elements # Defaults to auto.
          --html-formatter-bracket-same-line=: Whether to hug the closing bracket of multiline HTML tags to the end of the last line, rather than being alone on the following line.
          --html-formatter-whitespace-sensitivity=: Whether to account for whitespace sensitivity when formatting HTML (and its super languages).
          --html-formatter-indent-script-and-style=: Indent the <script> and <style> tags in HTML (and its super languages)
          --html-formatter-self-close-void-elements=: Whether void elements should be self-closed.
          --html-formatter-trailing-newline=: Add a trailing newline to the end of HTML (and its super languages) files
        - *flags_vcs_def
        - *flags_filesystem_def
        - *flags_global_def
        - *flags_logging_def
        - &flags_json_fmt_def
          --json-formatter-enabled=: Control the formatter for JSON (and its super languages) files.
          --json-formatter-indent-style=: Indent style for JSON (and its super languages)
          --json-formatter-indent-width=: Indent size for JSON (and its super languages) # Default to 2.
          --json-formatter-line-ending=: Line endings for JSON (and its super languages) files
          --json-formatter-line-width=: Max line width for JSON (and its super languages) # Defaults to 80.
          --json-formatter-trailing-commas=: Print trailing commas wherever possible in multi-line comma-separated syntactic structures.
          --json-formatter-expand=: Whether to expand arrays and objects on multiple lines.
          --json-formatter-bracket-spacing=: Whether to insert spaces around brackets in object literals.
          --json-formatter-trailing-newline=: Add a trailing newline at the end of JSON (and its super languages) files
        - --write: Writes formatted files to a file system.
          --fix: Writes formatted files to a file system.
        - *flags_stdin_file_path_def
        - *flags_vcs_file_selection_def
        - *flags_vcs_file_selection_staged_def
    completion:
      positionalany: [$files]
      flag:
        <<:
          - &flags_global_fmt_cmp
            format-with-errors: *bool
            indent-style: &indentstyle [tab, space]
            line-ending: &lineending [lf, crlf, cr, auto]
            attribute-position: &attributeposition [multiline, auto]
            bracket-same-line: *bool
            bracket-spacing: *bool
            expand: &expandarrobj [auto, always, never]
            trailing-newline: *bool
            use-editorconfig: *bool
          - &flags_js_fmt_cmp
            javascript-formatter-enabled: *bool
            jsx-quote-style: &quotestyle ["double\tdefault", single]
            quote-properties: [preserve, as-needed]
            trailing-commas: [all, es5, none]
            semicolons: [always, as-needed]
            arrow-parentheses: ["always\tdefault", as-needed]
            bracket-same-line: *boolFalse
            javascript-formatter-indent-style: *indentstyle
            javascript-formatter-line-ending: *lineending
            javascript-formatter-quote-style: *quotestyle
            javascript-formatter-attribute-position: *attributeposition
            javascript-formatter-bracket-spacing: *boolTrue
            javascript-formatter-expand: *expandarrobj
            javascript-formatter-operator-linebreak:
              - "before\tthe operator is placed before the expression"
              - "after\tthe operator is placed after the expression (default)"
            javascript-formatter-trailing-newline: *bool
          - *flags_json_parser_cmp
          - &flags_css_parser_cmp
            css-parse-css-modules: *bool
            css-parse-tailwind-directives: *bool
          - &flags_graphql_fmt_cmp
            graphql-formatter-enabled: *bool
            graphql-formatter-indent-style: *indentstyle
            graphql-formatter-line-ending: *lineending
            graphql-formatter-quote-style: *quotestyle
            bracket-spacing: *boolTrue
            graphql-formatter-trailing-newline: *bool
          - &flags_css_fmt_cmp
            css-formatter-enabled: *bool
            css-formatter-indent-style: *indentstyle
            css-formatter-line-ending: *lineending
            css-formatter-quote-style: *quotestyle
            css-formatter-trailing-newline: *bool
          - &flags_html_fmt_cmp
            html-formatter-enabled: *bool
            html-formatter-indent-style: *indentstyle
            html-formatter-line-ending: *lineending
            html-formatter-attribute-position: *attributeposition
            html-formatter-bracket-same-line: *boolFalse
            html-formatter-whitespace-sensitivity:
              - "css\tdefault"
              - strict
              - ignore
            html-formatter-indent-script-and-style: *boolFalse
            html-formatter-self-close-void-elements: [always, "never\tdefault"]
            html-formatter-trailing-newline: *bool
          - *flags_vcs_cmp
          - *flags_filesystem_cmp
          - *flags_global_cmp
          - *flags_logging_cmp
          - &flags_json_fmt_cmp
            json-formatter-enabled: *bool
            json-formatter-indent-style: *indentstyle
            json-formatter-line-ending: *lineending
            json-formatter-trailing-commas: ["none\tdefault", all]
            json-formatter-expand: *expandarrobj
            json-formatter-bracket-spacing: *boolTrue
            json-formatter-trailing-newline: *bool
          - *flags_vcs_file_selection_cmp
          - *flags_stdin_file_path_cmp

  - name: check
    description: Format, lint, and sort imports for files
    flags:
      <<:
        - *flags_global_def
        - *flags_logging_def
        - *flags_vcs_def
        - *flags_filesystem_def
        - *flags_global_fmt_def
        - *flags_json_fmt_def
        - *flags_js_fmt_def
        - *flags_json_parser_def
        - *flags_css_parser_def
        - *flags_css_fmt_def
        - *flags_graphql_fmt_def
        - *flags_html_fmt_def
        - *flags_js_linter_def
        - *flags_json_linter_def
        - *flags_rule_selection_def
        - *flags_profile_rules_def
        - *flags_stdin_file_path_def
        - *flags_vcs_file_selection_def
        - *flags_vcs_file_selection_staged_def
        - &flags_css_linter_def
          --css-linter-enabled=: Control the linter for CSS files.
        - &flags_html_linter_def
          --html-linter-enabled=: Control the linter for HTML (and its super languages) files.
        - &flags_grit_linter_def
          --grit-linter-enabled=: Control the linter for Grit files.
        - &flags_graphql_linter_def
          --graphql-linter-enabled=: Control the formatter for GraphQL files.
        - &flags_grit_fmt_def
          --grit-formatter-enabled=: Control the formatter for Grit files.
          --grit-formatter-indent-style=: Indent style for Grit
          --grit-formatter-indent-width=: Intent size for Grit # Default to 2.
          --grit-formatter-line-ending=: Line endings for Grit files
          --grit-formatter-line-width=: Max line width for Grit # Defaults to 80.
          --grit-formatter-trailing-newline=: Whether to add a trailing newline at the end of the file.
        - &flags_enabled_assist_def
          --javascript-assist-enabled=: Control the assist for JavaScript (and its super languages) files.
          --css-assist-enabled=: Control the assist for CSS files.
          --graphql-assist-enabled=: Control the formatter for GraphQL files.
          --grit-assist-enabled=: Control the assist functionality for Grit files.
          --json-assist-enabled=: Control the assist for JSON (and its super languages) files.
          --html-assist-enabled=: Control the assist for HTML (and its super languages) files.
        - &flags_enabled_checks_def
          --formatter-enabled=: Control the formatter check
          --linter-enabled=: Control the linter check
          --assist-enabled=: Control the assist
          --enforce-assist=: Enforce assist, and fail if some actions aren't applied
        - &flags_check_shared_misc_def
          --jsx-everywhere=: Allow files like .js/.mjs/.cjs to contain JSX syntax
          --line-width=: Max line width # Defaults to 80.
        - --write: Apply safe fixes, formatting and import sorting
          --unsafe: Apply unsafe fixes. Should be used with --write or --fix
          --fix: Apply safe fixes, formatting and import sorting
    completion:
      positionalany: [$files]
      flag:
        <<:
          - *flags_global_cmp
          - *flags_logging_cmp
          - *flags_vcs_cmp
          - *flags_filesystem_cmp
          - *flags_global_fmt_cmp
          - *flags_json_fmt_cmp
          - *flags_js_fmt_cmp
          - *flags_json_parser_cmp
          - *flags_css_parser_cmp
          - *flags_css_fmt_cmp
          - *flags_graphql_fmt_cmp
          - *flags_html_fmt_cmp
          - *flags_js_linter_cmp
          - *flags_json_linter_cmp
          - *flags_stdin_file_path_cmp
          - *flags_vcs_file_selection_cmp
          - &flags_css_linter_cmp
            css-linter-enabled: *bool
          - &flags_html_linter_cmp
            html-linter-enabled: *bool
          - &flags_grit_linter_cmp
            grit-linter-enabled: *bool
          - &flags_graphql_linter_cmp
            graphql-linter-enabled: *bool
          - &flags_grit_fmt_cmp
            grit-formatter-enabled: *bool
            grit-formatter-indent-style: *indentstyle
            grit-formatter-line-ending: *lineending
            grit-formatter-trailing-newline: *bool
          - &flags_enabled_assist_cmp
            javascript-assist-enabled: *bool
            css-assist-enabled: *bool
            graphql-assist-enabled: *bool
            grit-assist-enabled: *bool
            json-assist-enabled: *bool
            html-assist-enabled: *bool
          - &flags_check_shared_misc_cmp
            jsx-everywhere: *bool
          - &flags_enabled_checks_cmp
            formatter-enabled: *bool
            linter-enabled: *bool
            assist-enabled: *bool
            enforce-assist: *bool

  - name: ci
    description: Check files for CI environments
    flags:
      <<:
        - *flags_global_def
        - *flags_logging_def
        - *flags_js_fmt_def
        - *flags_js_linter_def
        - *flags_enabled_checks_def
        - *flags_global_fmt_def
        - *flags_enabled_assist_def
        - *flags_css_fmt_def
        - *flags_css_parser_def
        - *flags_css_linter_def
        - *flags_filesystem_def
        - *flags_graphql_fmt_def
        - *flags_graphql_linter_def
        - *flags_html_fmt_def
        - *flags_html_linter_def
        - *flags_grit_fmt_def
        - *flags_grit_linter_def
        - *flags_rule_selection_def
        - *flags_vcs_def
        - *flags_json_fmt_def
        - *flags_json_linter_def
        - *flags_json_parser_def
        - *flags_vcs_file_selection_def
        - *flags_check_shared_misc_def
        - --threads=: Number of threads to use
    completion:
      positionalany: [$files]
      flag:
        <<:
          - *flags_global_cmp
          - *flags_logging_cmp
          - *flags_js_fmt_cmp
          - *flags_js_linter_cmp
          - *flags_enabled_checks_cmp
          - *flags_global_fmt_cmp
          - *flags_enabled_assist_cmp
          - *flags_css_fmt_cmp
          - *flags_css_parser_cmp
          - *flags_css_linter_cmp
          - *flags_filesystem_cmp
          - *flags_graphql_fmt_cmp
          - *flags_graphql_linter_cmp
          - *flags_html_fmt_cmp
          - *flags_html_linter_cmp
          - *flags_grit_fmt_cmp
          - *flags_grit_linter_cmp
          - *flags_vcs_cmp
          - *flags_json_fmt_cmp
          - *flags_json_linter_cmp
          - *flags_json_parser_cmp
          - *flags_vcs_file_selection_cmp
          - *flags_check_shared_misc_cmp

  - name: init
    description: Create a config file
    flags:
      --jsonc: Create a biome.jsonc file

  - name: lsp-proxy
    description: Run a Language Server
    flags:
      <<:
        - *flags_logging_def
        - *flags_daemon_def
    completion:
      flag:
        <<:
          - *flags_logging_cmp
          - *flags_daemon_cmp

  - name: migrate
    description: Migrate from older version of Biome or other tools
    commands:
      - name: prettier
        description: Import Prettier config
      - name: eslint
        description: Import ESLint config
        flags:
          --include-inspired: Includes rules inspired from an eslint rule in the migration
          --include-nursery: Includes nursery rules in the migration
    flags:
      <<:
        - *flags_global_def
        - *flags_logging_def
        - --write: Writes the new configuration file to disk
          --fix: Writes the new configuration file to disk
    completion:
      flag:
        <<:
          - *flags_global_cmp
          - *flags_logging_cmp

  - name: search
    description: Searches for Grit patterns across a project # (EXPERIMENTAL)
    flags:
      <<:
        - *flags_global_def
        - *flags_filesystem_def
        - *flags_logging_def
        - *flags_vcs_def
        - *flags_stdin_file_path_def
        - -l, --language=: The language to which the pattern applies.
    completion:
      positional:
        - - $usage(PATTERN)
      positionalany:
        - $files
      flag:
        <<:
          - *flags_global_cmp
          - *flags_filesystem_cmp
          - *flags_logging_cmp
          - *flags_vcs_cmp
          - *flags_stdin_file_path_cmp
          - stdin-file-path: [$files]

  - name: explain
    description: Shows documentation of various aspects of the CLI # it doesn't do that
    completion:
      positional: [[$usage(Single name to display documentation for.)]]

  - name: clean
    description: Cleans logs emitted by the daemon
