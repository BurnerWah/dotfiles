---
extends: relaxed

ignore:
  - /node_modules/*
  - /pnpm-lock.yaml
  - /schemas/vendor/*
  - modify_*
  - remove_*
  - symlink_*

rules:
  comments:
    level: warning
    min-spaces-from-content: 1 # for ansible-lint
  comments-indentation: false
  document-start: disable
  line-length:
    max: 160
    level: warning
    ignore:
      - /home/dot_config/*_carapace/*_specs/*
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  octal-values:
    level: warning
    forbid-explicit-octal: true # for ansible-lint
    forbid-implicit-octal: true # for ansible-lint
  trailing-spaces:
    level: warning
  indentation:
    ignore:
      - /home/dot_config/*_carapace/*_specs/*
  quoted-strings:
    level: warning
    required: only-when-needed
    quote-type: single
    allow-quoted-quotes: true
    ignore:
      - /home/dot_config/*_carapace/*
      - /home/dot_config/*_lima/private_*/lima.yaml
